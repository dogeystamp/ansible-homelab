[defaults]
roles_path = roles:roles/containers
display_ok_hosts = false
display_skipped_hosts = false
result_format = yaml
stdout_callback=community.general.timestamp

[privilege_escalation]
become_method = sudo
become = true

[ssh_connection]
ssh_args = -C -o ControlMaster=auto -o ControlPersist=60s -o ConnectTimeout=30 -o ConnectionAttempts=10
pipelining = true
